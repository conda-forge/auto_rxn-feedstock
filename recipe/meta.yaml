{% set name = "auto_rxn" %}
{% set version = "2026.5.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/auto_rxn-{{ version }}.tar.gz
  sha256: bdb038f987c316a36e33c5b8684e84ad44c74a21a0db7f108f32c66d6d335b6d

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0
  entry_points:
    - auto_rxn=auto_rxn.__main__:main
    - auto-rxn=auto_rxn.__main__:main

requirements:
  host:
    - python >=3.7
    - hatchling
    - pip
  run:
    - python >=3.7
    - platformdirs
    - click
    - happi
    - pandas
    - bluesky
    - suitcase-csv
    - packaging
    - tomli
    - tomli-w

test:
  imports:
    - auto_rxn
  commands:
    #- pip check  # bluesky recipe has bad depndencies, breaks pip check, should check once upstream fixed
    - auto_rxn --help
    - auto-rxn --help
  requires:
    - pip

about:
  home: https://github.com/uw-madison-chem-shops/auto_rxn
  summary: Python package for running chemical reactions as defined by recipe files.
  dev_url: https://github.com/uw-madison-chem-shops/auto_rxn
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - untzag
